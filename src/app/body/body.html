<section class="Aero-section">
  <div class="container pt-5 pb-4">
    <h2 class="text-white text-center fw-bold mb-4">Busca tu próximo vuelo</h2>

    <form class="p-4 bg-dark rounded shadow text-white" (ngSubmit)="buscar()">

      <div class="row g-3">

        <div class="col-md-3">
          <label class="form-label">Origen</label>
          <select class="form-select" [(ngModel)]="origen" name="origen">
            <option value="">Selecciona origen</option>
            <option *ngFor="let o of origenes" [value]="o.value">{{ o.label }}</option>
          </select>
        </div>

        <div class="col-md-4">
          <label class="form-label">Destino</label>
          <select class="form-select" [(ngModel)]="destino" name="destino">
            <option value="">Selecciona destino</option>
            <option *ngFor="let d of destinos" [value]="d.value">{{ d.label }}</option>
          </select>
        </div>

        <div class="col-md-3">
          <label class="form-label">Fecha (opcional)</label>
          <input
            type="date"
            class="form-control"
            [(ngModel)]="fecha"
            name="fecha"
            [min]="fechaMinima">
        </div>

        <div class="col-md-2 d-flex align-items-end">
          <button
            type="submit"
            class="btn btn-primary w-100"
            [disabled]="buscando">

            <span *ngIf="buscando" class="spinner-border spinner-border-sm me-1"></span>
            {{ buscando ? 'Buscando...' : 'Buscar' }}
          </button>
        </div>

      </div>

      <div *ngIf="errorMsg" class="alert alert-danger mt-3 mb-0">
        {{ errorMsg }}
      </div>
    </form>
    <hr class="my-5 text-white">
    <h3 class="text-center text-white fw-bold mb-4">
      Aeronaves de AeroMono
    </h3>
  </div>
<div class="row g-4">
  <div class="col-md-6">
    <div class="card shadow h-100">
      <img src="/avion1.png" class="card-img-top" alt="AM-01 Fénix">

      <div class="card-body text-center">
        <h4 class="fw-bold">AM-01 Banano</h4>

        <p class="text-muted">
          Primer avión oficial de Aeromono
        </p>

        <button
          class="btn btn-primary"
          (click)="mostrarInfoAvion('fenix')">
          Ver información
        </button>
      </div>
    </div>
  </div>

  <div class="col-md-6">
    <div class="card shadow h-100">
      <img src="/avion2.png" class="card-img-top" alt="AM-02 Cóndor">

      <div class="card-body text-center">
        <h4 class="fw-bold">AM-02 B.Milo</h4>

        <p class="text-muted">
          Segundo avión oficial de Aeromono
        </p>

        <button
          class="btn btn-primary"
          (click)="mostrarInfoAvion('condor')">
          Ver información
        </button>
      </div>
    </div>
  </div>

</div>
<div
  *ngIf="mostrarModal"
  class="modal-backdrop-custom"
  (click)="cerrarModal()">

  <div
    class="modal-content-custom"
    (click)="$event.stopPropagation()">

    <button
      type="button"
      class="btn-close"
      style="position:absolute; right:15px; top:15px;"
      (click)="cerrarModal()">
    </button>

    <img
      [src]="imagenAvion"
      class="img-fluid rounded mb-3"
      [alt]="tituloAvion">

    <h2 class="fw-bold mb-3">
      {{ tituloAvion }}
    </h2>

    <p style="white-space: pre-line;">
      {{ descripcionAvion }}
    </p>

    <button
      class="btn btn-primary mt-3"
      (click)="cerrarModal()">
      Cerrar
    </button>

  </div>
</div>
</section>
