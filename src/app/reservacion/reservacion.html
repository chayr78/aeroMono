<section class="reservacion-bg py-5 text-dark">
  <div class="container">
    <h1 class="fw-bold text-center mb-4 text-white">Reservacion</h1>

    <!-- Tabs -->
    <div class="d-flex justify-content-center mb-4 gap-2">
      <button class="btn"
        [class.btn-primary]="modoVista === 'formulario'"
        [class.btn-outline-primary]="modoVista !== 'formulario'"
        (click)="modoVista = 'formulario'; confirmada = false; folioGenerado = ''">
        Nueva reservacion
      </button>

      <button class="btn text-white"
        [class.btn-primary]="modoVista === 'busqueda'"
        [class.btn-outline-primary]="modoVista !== 'busqueda'"
        (click)="modoVista = 'busqueda'" >
        Buscar por folio
      </button>
    </div>

    <!-- ── FORMULARIO ── -->
    <div *ngIf="modoVista === 'formulario'">

      <!-- Confirmacion -->
      <div *ngIf="confirmada" class="card border-success shadow mx-auto mb-4" style="max-width: 520px;">
        <div class="card-header bg-success text-white fw-bold text-center fs-5">
          Reservacion confirmada
        </div>

        <div class="card-body">
          <div class="text-center mb-4 p-3 bg-light rounded border">
            <p class="mb-1 text-muted small">Guarda tu numero de folio</p>
            <span class="fw-bold fs-3 text-primary">{{ folioGenerado }}</span>
          </div>

          <table class="table table-bordered mb-3">
            <tbody>
              <tr><td class="fw-semibold">Nombre</td><td>{{ reserva.nombre }}</td></tr>
              <tr><td class="fw-semibold">Origen</td><td>{{ reserva.origen }}</td></tr>
              <tr><td class="fw-semibold">Destino</td><td>{{ reserva.destino }}</td></tr>
              <tr><td class="fw-semibold">Fecha</td><td>{{ reserva.fecha }}</td></tr>
              <tr><td class="fw-semibold">Pasajeros</td><td>{{ reserva.pasajeros }}</td></tr>
            </tbody>
          </table>

          <button class="btn btn-outline-primary w-100" (click)="nueva()">
            Hacer otra reservacion
          </button>
        </div>
      </div>

      <!-- Formulario -->
      <div *ngIf="!confirmada" class="card p-4 shadow mx-auto" style="max-width: 520px;">

        <div class="mb-3">
          <label class="form-label fw-semibold">Nombre completo</label>
          <input class="form-control" [(ngModel)]="reserva.nombre">
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Origen</label>
          <select class="form-select" [(ngModel)]="reserva.origen">
            <option value="">Selecciona origen</option>
            <option *ngFor="let o of origenes" [value]="o">{{ o }}</option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Destino</label>
          <select class="form-select" [(ngModel)]="reserva.destino">
            <option value="">Selecciona destino</option>
            <option *ngFor="let d of destinos" [value]="d">{{ d }}</option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Fecha de viaje</label>
          <input class="form-control" type="date" [(ngModel)]="reserva.fecha">
        </div>

        <div class="mb-4">
          <label class="form-label fw-semibold">Pasajeros</label>
          <input class="form-control" type="number" min="1" max="10" [(ngModel)]="reserva.pasajeros">
        </div>

        <button class="btn btn-primary w-100 fw-bold"
          (click)="reservar()" [disabled]="guardando">
          {{ guardando ? 'Guardando...' : 'Confirmar reservacion' }}
        </button>

      </div>
    </div>

    <!-- ── BUSQUEDA ── -->
    <div *ngIf="modoVista === 'busqueda'" class="card p-4 shadow mx-auto" style="max-width: 520px;">

      <label class="form-label fw-semibold">Numero de folio</label>

      <div class="input-group mb-3">
        <input class="form-control" [(ngModel)]="folioBusqueda">
        <button class="btn btn-primary" (click)="buscarFolio()">Buscar</button>
      </div>

    </div>

  </div>
</section>
